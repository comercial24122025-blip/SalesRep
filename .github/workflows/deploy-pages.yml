name: Deploy SalesRep Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Build static artifact
        run: |
          mkdir -p dist/data dist/assets dist/my-actions dist/pipeline
          cp *.html dist/
          cp script.js dist/script.js
          cp style.css dist/style.css
          cp -R assets/. dist/assets/
          cp data/published-state.json dist/data/published-state.json
          cp data/pipeline-command-center.xlsx dist/data/pipeline-command-center.xlsx
          if [ -f my-actions/index.html ]; then cp my-actions/index.html dist/my-actions/index.html; fi
          if [ -f pipeline/index.html ]; then cp pipeline/index.html dist/pipeline/index.html; fi
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
